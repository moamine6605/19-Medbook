services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/backend
    volumes:
      - ./src/backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
      - backend_storage:/var/www/backend/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/backend/storage/app/database.sqlite
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    working_dir: /var/www/frontend
    volumes:
      - ./src/frontend:/var/www/frontend
      - frontend_node_modules:/var/www/frontend/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_vendor:
  backend_storage:
  frontend_node_modules:

